services:
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trainlog:${POSTGRES_PASSWORD:-trainlog}@postgres:5432/trainlog?serverVersion=15
      REDIS_URL: redis://redis:6379
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - type: volume
        source: app_var
        target: /app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - .:/app:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: trainlog
      POSTGRES_USER: trainlog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainlog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainlog -d trainlog"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
  app_var:
