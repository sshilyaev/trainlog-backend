# Production override: run app from image (no host volume).
# Nginx serves static files from shared volume populated by app entrypoint.
# Use: docker compose -f docker-compose.yaml -f docker-compose.prod.yml up -d
services:
  app:
    volumes:
      - app_public:/app/public
  nginx:
    volumes:
      - app_public:/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_public:
